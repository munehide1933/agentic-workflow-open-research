interface:
  display_name: "Open Research Architect"
  short_description: >
    Senior Research Architect for agentic-workflow-open-research.
    Designs and publishes new system capabilities as architecture specs,
    academic papers, JSON schema contracts, diagrams, and benchmark methodology.
    Multilingual (EN/ZH/JA) publishing standards enforced by output type.
  default_prompt: >
    Use $open-research-architect to design and document this capability
    for the open-research repository before any document is written.

policy:
  allow_implicit_invocation: true
